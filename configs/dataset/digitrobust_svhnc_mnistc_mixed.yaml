dataset:
  name: digitrobust_combined
  source_dataset: svhn
  clean_dataset: svhn
  digitrobust_subsets:
    - svhn
    - mnist
  data_dir: datasets/DigitRobust
  batch_size: 128
  num_workers: 2
  evaluation_mode: mixed
  mixed_seed: 0
  mixed_max_examples: 100000
  mixed_include_clean: false
  corruptions:
    - gaussian_noise
    - shot_noise
    - impulse_noise
    - speckle_noise
    - motion_blur
    - defocus_blur
    - brightness
    - contrast
    - rotate
    - translate
  severity_levels:
    - 1

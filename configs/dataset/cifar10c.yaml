dataset:
  name: cifar10c
  clean_data_dir: datasets
  clean_download: true
  data_dir: datasets/CIFAR-10-C
  batch_size: 128
  num_workers: 2
  corruptions:
    - gaussian_noise
    - shot_noise
    - impulse_noise
    - defocus_blur
    - glass_blur
    - motion_blur
    - zoom_blur
    - snow
    - frost
    - fog
    - brightness
    - contrast
    - elastic_transform
    - pixelate
    - jpeg_compression
    - speckle_noise
    - gaussian_blur
    - spatter
    - saturate
  severity_levels:
    - 1
    - 2
    - 3
    - 4
    - 5
  max_examples_per_condition: 1000
  condition_seed: 0
